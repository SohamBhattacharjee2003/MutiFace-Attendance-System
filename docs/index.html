<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PresenceAI</title>

<!--
  The permanent front door.

  The app runs on a laptop behind a Cloudflare quick-tunnel, and that tunnel gets a NEW
  random *.trycloudflare.com hostname on every restart. Handing students the tunnel URL
  directly is what caused the 530s: restart the tunnel and every link already shared is
  dead.

  So students are given THIS page instead — a github.io URL that never changes — and
  host.sh rewrites the one line below each time it starts. The link in the report stays
  valid forever; only this file moves.

  It also probes /api/health first, so when the laptop is off a student sees a plain
  "not open right now" instead of a raw Cloudflare error page.
-->
<style>
  :root { --bg:#05070f; --card:#0a0f24; --line:rgba(148,163,184,.14);
          --text:#e7ecf5; --muted:#93a1b8; --brand:#4f8bff; --brand2:#22d3ee; }
  * { box-sizing:border-box; }
  body {
    margin:0; min-height:100vh; display:grid; place-items:center; padding:1.5rem;
    color:var(--text); background:
      radial-gradient(1100px 700px at 12% -8%, rgba(79,139,255,.14), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(34,211,238,.10), transparent 55%),
      var(--bg);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .card {
    width:100%; max-width:26rem; padding:2.25rem 1.75rem; text-align:center;
    background:color-mix(in srgb, var(--card) 72%, transparent);
    border:1px solid var(--line); border-radius:1rem;
    box-shadow:0 10px 30px -12px rgba(0,0,0,.55); backdrop-filter:blur(16px);
  }
  h1 { margin:0 0 .35rem; font-size:1.5rem; font-weight:800; letter-spacing:-.02em; }
  p  { margin:.35rem 0 0; color:var(--muted); font-size:.95rem; line-height:1.55; }
  .dot {
    width:2.75rem; height:2.75rem; margin:0 auto 1.1rem; border-radius:999px;
    background:linear-gradient(135deg,var(--brand),var(--brand2));
  }
  .spin {
    width:2.75rem; height:2.75rem; margin:0 auto 1.1rem; border-radius:999px;
    border:3px solid rgba(148,163,184,.18); border-top-color:var(--brand);
    animation:spin .8s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .hide { display:none; }
  code {
    display:inline-block; margin-top:.9rem; padding:.4rem .6rem; font-size:.8rem;
    color:var(--muted); background:rgba(148,163,184,.08); border-radius:.5rem;
  }
</style>
</head>
<body>

<div class="card">
  <div id="loading">
    <div class="spin"></div>
    <h1>Connecting…</h1>
    <p>Taking you to the attendance system.</p>
  </div>

  <div id="offline" class="hide">
    <div class="dot"></div>
    <h1>Not open right now</h1>
    <p>Attendance is only running during a session. Ask your teacher to start it, then
       reload this page — the link stays the same.</p>
    <code id="when"></code>
  </div>
</div>

<script>
  // ── host.sh rewrites this line on every start. Do not edit by hand. ──
  const TUNNEL = "https://billy-avoiding-dealer-realize.trycloudflare.com";
  const UPDATED = "14 Jul, 10:18";

  // Students scan a QR at .../#/enroll/IT-B-2026 — carry that path across to the tunnel,
  // so one stable link serves every class.
  const path = (location.hash || "").replace(/^#/, "") || "/";

  const show = id => {
    document.getElementById("loading").classList.add("hide");
    document.getElementById(id).classList.remove("hide");
  };

  const offline = () => {
    document.getElementById("when").textContent =
      UPDATED ? "last online " + UPDATED : "never started";
    show("offline");
  };

  if (!TUNNEL) {
    offline();
  } else {
    // Don't just redirect: if the laptop is asleep the tunnel hostname still resolves and
    // Cloudflare answers 530, which looks like a broken project. Ask the server itself.
    const cancel = setTimeout(offline, 6000);
    fetch(TUNNEL + "/api/health", { cache: "no-store" })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(() => { clearTimeout(cancel); location.replace(TUNNEL + path); })
      .catch(() => { clearTimeout(cancel); offline(); });
  }
</script>

</body>
</html>
